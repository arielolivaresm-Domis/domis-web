<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PCF-15™ By Domis v5.1 (Normative Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdofr15_QlhG_WvG1vISGEVb-daCDX5nA&libraries=places,geometry&language=es"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0F172A;
        color: #F8FAFC;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      /* OCULTAR SPINNERS NATIVOS EN INPUTS NUMBER */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
      }
      input[type=number] {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      @media print {
        /* FUERZA LA IMPRESIÓN DE COLORES DE FONDO */
        body {
          background: white;
          color: black;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        .no-print { display: none !important; }
        .print-only { display: block !important; }
        .card { border: 1px solid #000; box-shadow: none; break-inside: avoid; page-break-inside: avoid; }
        input, select, textarea { border: 1px solid #ccc; background: white !important; color: black !important; }
        ::-webkit-input-placeholder { color: transparent; }

        /* CLASE ESPECÍFICA PARA QUE LA NOTA SELECCIONADA DESTAQUE EN B/N */
        .print-selected {
            background-color: #dc2626 !important; /* Rojo Intenso */
            color: white !important;
            border: 2px solid black !important;
            font-weight: bold !important;
            box-shadow: none !important;
        }
        .print-unselected {
            border: 1px solid #ccc !important;
            color: #ccc !important;
            background: transparent !important;
        }
      }
    </style>
    <script>
      // Polyfills esenciales para librerías modernas
      window.global = window;
      window.process = {
        env: {
          NODE_ENV: 'production',
          API_KEY: 'AIzaSyAdofr15_QlhG_WvG1vISGEVb-daCDX5nA'
        }
      };

      // Global Error Handler
      window.addEventListener('error', function(e) {
        const root = document.getElementById('root');
        if(root && !root.innerHTML.includes('Error Detectado')) {
          console.error(e);
          // Solo mostrar si es un error fatal que deja la pantalla vacía
          if(root.innerText.includes('Cargando sistema')) {
             root.innerHTML = `<div style="color: #ef4444; padding: 20px; text-align: center; font-family: sans-serif;">
            <h2 style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px;">Error de Ejecución</h2>
            <p style="background: #1e293b; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.8rem;">${e.message}</p>
            <button onclick="window.location.reload()" style="margin-top: 15px; padding: 8px 16px; background: #0ea5e9; color: white; border: none; border-radius: 4px; cursor: pointer;">Reintentar</button>
          </div>`;
          }
        }
      });
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/": "https://esm.sh/react@18.2.0/",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/": "https://esm.sh/react-dom@18.2.0/",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "@google/genai": "https://esm.sh/@google/genai@0.1.1",
        "jszip": "https://esm.sh/jszip@3.10.1"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root" class="flex items-center justify-center min-h-screen text-slate-500">
       <div class="text-center">
         <div class="text-2xl font-bold mb-2">Domis PCF-15™</div>
         <div class="text-sm animate-pulse">Iniciando v5.1 (Normativa)...</div>
       </div>
    </div>
    <script type="module" src="./index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
